services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: StrongAdminPass123!
      MYSQL_DATABASE: backup_db
      MYSQL_USER: dbadmin
      MYSQL_PASSWORD: StrongAdminPass123!
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: dbadmin
      DB_PASSWORD: StrongAdminPass123!
      DB_NAME: backup_db
      PORT: 8080
      CORS_ORIGIN: http://localhost:9090
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      JWT_SECRET: replace-this-before-production
    ports:
      - "8080:8080"

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:8080
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "9090:80"

volumes:
  mysql-data:
